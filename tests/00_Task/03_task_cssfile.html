<!DOCTYPE html>
<html>
<head>
    <title>Signup Form</title>
</head>
<body style="margin:0; padding:0; background:#f4f7fc; font-family:Arial, Helvetica, sans-serif; display:flex; justify-content:center; align-items:center; height:100vh;">

    <form style="background:#ffffff; padding:30px; width:350px; border-radius:12px; box-shadow:0 8px 20px rgba(0,0,0,0.15);">

        <h2 style="text-align:center; color:#333; margin-bottom:25px;">Signup</h2>

        <label style="display:block; margin-bottom:6px; font-weight:bold; color:#444;">
            Email
        </label>
        <input
            type="email"
            placeholder="Enter your email"
            style="width:100%; padding:10px; border:1px solid #ccc; border-radius:6px; box-sizing:border-box; margin-bottom:18px; font-size:14px;"
        />

        <label style="display:block; margin-bottom:6px; font-weight:bold; color:#444;">
            Password
        </label>
        <input
            type="password"
            placeholder="Enter your password"
            style="width:100%; padding:10px; border:1px solid #ccc; border-radius:6px; box-sizing:border-box; margin-bottom:18px; font-size:14px;"
        />

        <div style="margin-bottom:20px;">
            <label style="color:#555; font-size:14px;">
                <input
                    type="checkbox"
                    style="margin-right:8px; transform:scale(1.1);"
                />
                Remember Me
            </label>
        </div>

        <button
            type="submit"
            style="width:100%; padding:12px; background:#007BFF; color:white; border:none; border-radius:6px; font-size:16px; font-weight:bold; cursor:pointer;"
        >
            Sign Up
        </button>

    </form>

</body>
</html>
